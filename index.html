            transition: opacity 1.6s ease;

            opacity: 0;
            pointer-events: none;
        }

            font-family: Georgia, serif;
            font-style: italic;
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: rgba(248, 232, 240, 0.7);
            letter-spacing: 0.08em;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.3);
        }

        .countdown-timer {
            font-family: Georgia, serif;
            font-style: italic;
            font-size: clamp(2.4rem, 10vw, 4.5rem);

        .countdown-sub {

            font-size: clamp(0.75rem, 2.5vw, 0.9rem);

            letter-spacing: 0.14em;

        </div>
    </div>
</div>

<script>
	// ── CIBLE : Lundi 15 Juin 2026, 18h00 ──
	const TARGET = new Date('2026-06-12T15:42:00');

	const timerEl = document.getElementById('timer-display');
	const screen  = document.getElementById('countdown-screen');
	const scene   = document.getElementById('flowers-scene');
	const night   = document.getElementById('night-bg');
	let flowersModeActive = false;

	function pad(n) { return String(n).padStart(2, '0'); }

	function formatDelta(ms) {
		if (ms <= 0) return null;
		const totalSec = Math.floor(ms / 1000);
		const days  = Math.floor(totalSec / 86400);
		const hours = Math.floor((totalSec % 86400) / 3600);
		const mins  = Math.floor((totalSec % 3600) / 60);
		const secs  = totalSec % 60;
		if (days > 0) return `${days}j ${pad(hours)}h ${pad(mins)}m`;
		return `${pad(hours)}:${pad(mins)}:${pad(secs)}`;
	}

	function revealFlowers() {
		if (flowersModeActive) return;
		flowersModeActive = true;

		// Fade out countdown screen
		screen.classList.add('hidden');

		// Après la transition du screen, activer les fleurs
		setTimeout(() => {
			screen.style.display = 'none';
			document.body.classList.remove('not-loaded');
			scene.classList.add('visible');
			night.classList.add('visible');

			// Activer les listeners de messages
			window.addEventListener('click', showRandomMessage);
			window.addEventListener('touchstart', showRandomMessage, { passive: true });
		}, 1700);
	}

	function tick() {
		const delta = TARGET - Date.now();
		const formatted = formatDelta(delta);
		if (!formatted) {
			timerEl.textContent = '—';
			revealFlowers();
		} else {
			timerEl.textContent = formatted;
		}
	}

	tick();
	const interval = setInterval(() => {
		const delta = TARGET - Date.now();
		if (delta <= 0) {
			clearInterval(interval);
			revealFlowers();
		} else {
			tick();
		}
	}, 1000);

	// ── MESSAGES AU CLIC ──
    const messages = [
        "C'est bien de te voir comme ça",
        "Le lac te va bien",
        "Tu rayonnes un peu ce soir",
        "Ça te va bien, la lumière ici",
        "Le soir te réussit",
        "C'était une bonne idée, non ?",
        "Tu souris beaucoup ce soir",
        "Tu sembles légère",
        "C'est beau de te voir heureuse",
        "Tu as l'air bien",
        "Ça fait plaisir de te voir comme ça",
        "Cette version de toi est sympa"
    ];

    const activeMessageRects = [];
	const visibleMessages = new Set();

	function randomBetween(min, max) { return Math.random() * (max - min) + min; }

	function cleanupRect(id) {
		const index = activeMessageRects.findIndex(item => item.id === id);
		if (index !== -1) activeMessageRects.splice(index, 1);
	}

	function overlaps(a, b, gap = 12) {
		return !(a.right + gap < b.left || a.left > b.right + gap || a.bottom + gap < b.top || a.top > b.bottom + gap);
	}

	function pickAvailableMessage() {
		const available = messages.filter(m => !visibleMessages.has(m));
		if (!available.length) return null;
		return available[Math.floor(Math.random() * available.length)];
	}

	function findMessagePosition(width, height) {
		const px = 16;
		const minTop = 18;
		const maxTop = Math.max(18, window.innerHeight * 0.82 - height);
		const maxLeft = Math.max(px, window.innerWidth - width - px);
		for (let i = 0; i < 24; i++) {
			const left = randomBetween(px, maxLeft);
			const top  = randomBetween(minTop, maxTop);
			const rect = { left, top, right: left + width, bottom: top + height };
			if (!activeMessageRects.some(item => overlaps(rect, item.rect, 14))) {
				return { left, top, rect };
			}
		}
		return null;
	}

	function showRandomMessage() {
		if (!flowersModeActive) return;
		const text = pickAvailableMessage();
		if (!text) return;

		const el = document.createElement('div');
		const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
		const duration = randomBetween(4.6, 6.4);

		el.className = 'floating-msg';
		el.textContent = text;
		el.style.setProperty('--delay', '0s');
		el.style.setProperty('--duration', `${duration}s`);
		el.style.visibility = 'hidden';
		document.body.appendChild(el);

		const w = el.offsetWidth;
		const h = el.offsetHeight;
		const pos = findMessagePosition(w, h);

		if (!pos) { el.remove(); return; }

		el.style.left = `${pos.left}px`;
		el.style.top  = `${pos.top}px`;
		el.style.visibility = 'visible';

		activeMessageRects.push({ id, rect: pos.rect });
		visibleMessages.add(text);

		setTimeout(() => {
			cleanupRect(id);
			visibleMessages.delete(text);
			el.remove();
		}, duration * 1000 + 350);
	}
</script>
</body>
</html>
